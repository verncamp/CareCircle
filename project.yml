name: CareCircle
options:
  bundleIdPrefix: com.vernoncampbell
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

targets:
  CareCircle:
    type: application
    platform: iOS
    sources:
      - path: CareCircleApp.swift
      - path: ContentView.swift
      - path: Models
      - path: Views
      - path: Helpers
    entitlements:
      path: CareCircle.entitlements
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.vernoncampbell.carecircle
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_NAME: CareCircle
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTS_MACCATALYST: NO
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SDKROOT: iphoneos
        INFOPLIST_KEY_NSHealthShareUsageDescription: "CareCircle reads health data to show your parent's vitals to trusted family members."
        INFOPLIST_KEY_NSCameraUsageDescription: "CareCircle uses the camera to scan documents into your vault."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: R8HQ8WYP5T

schemes:
  CareCircle:
    build:
      targets:
        CareCircle: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
